# MySQL (default for local dev). Override URL/username/password for your environment.
spring.datasource.url=jdbc:mysql://localhost:3306/financedb?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT signing secret (min 256 bits for HS256). Override in production.
jwt.secret=change-me-use-at-least-32-bytes-for-hs256-secret-key!!
jwt.expiration-ms=3600000
